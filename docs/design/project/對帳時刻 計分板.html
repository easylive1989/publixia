<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>全員對帳中 · Stock Guru Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Noto+Sans+TC:wght@500;700;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --field: oklch(0.962 0.005 250);
    --panel: oklch(0.998 0.002 250);
    --panel-2: oklch(0.978 0.004 250);
    --ink: oklch(0.165 0.013 262);
    --ink-2: oklch(0.42 0.012 262);
    --ink-3: oklch(0.60 0.010 262);
    --line: oklch(0.86 0.008 260);
    --line-strong: var(--ink);
    --win: oklch(0.565 0.155 152);
    --win-bg: oklch(0.93 0.07 152);
    --loss: oklch(0.555 0.205 28);
    --loss-bg: oklch(0.93 0.065 30);
    --gold: oklch(0.76 0.135 85);
    --gold-bg: oklch(0.93 0.07 88);
    --band: var(--ink);
    --band-ink: oklch(0.97 0.005 250);
    --accent: oklch(0.66 0.17 30);
    --brand-red: oklch(0.62 0.205 28);
    --brand-green: oklch(0.72 0.16 150);

    --maxw: 1120px;
    --display: "Anton", "Noto Sans TC", sans-serif;
    --label: "Bebas Neue", "Noto Sans TC", sans-serif;
    --sans: "Noto Sans TC", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }

  [data-night="on"] {
    --field: oklch(0.165 0.016 262);
    --panel: oklch(0.205 0.017 262);
    --panel-2: oklch(0.235 0.018 262);
    --ink: oklch(0.96 0.006 250);
    --ink-2: oklch(0.74 0.012 250);
    --ink-3: oklch(0.56 0.012 250);
    --line: oklch(0.33 0.016 262);
    --win: oklch(0.78 0.16 152);
    --win-bg: oklch(0.32 0.07 152);
    --loss: oklch(0.70 0.19 28);
    --loss-bg: oklch(0.33 0.08 30);
    --gold: oklch(0.82 0.13 85);
    --gold-bg: oklch(0.34 0.07 88);
    --band: oklch(0.115 0.014 262);
    --band-ink: oklch(0.97 0.005 250);
  }

  body {
    margin: 0; background: var(--field); color: var(--ink);
    font-family: var(--sans); font-size: 16px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; font-feature-settings: "tnum" 1;
  }
  ::selection { background: var(--ink); color: var(--field); }
  .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .up { color: var(--win); } .down { color: var(--loss); }

  /* ---------- broadcast band header ---------- */
  .scorebar { background: var(--band); color: var(--band-ink); border-bottom: 3px solid var(--accent); }
  .scorebar-in {
    max-width: var(--maxw); margin: 0 auto; padding: 14px 26px;
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
  }
  .wordmark {
    display: flex; align-items: center; gap: 4px; position: relative;
  }
  .wm-vert, .wm-main, .wm-en, .wm-zh { position: relative; z-index: 1; }
  .wm-vert {
    display: flex; flex-direction: column; line-height: 0.9;
    font-family: var(--sans); font-weight: 900; font-size: 26px; letter-spacing: 1px;
    transform: skewX(-5deg);
    background: linear-gradient(177deg, #6df0a0 0%, #25c267 36%, #0c7a3a 56%, #149a4c 78%, #38d378 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 0.7px #053d1f;
    filter: drop-shadow(0 1.5px 0.5px oklch(0 0 0 / 0.6));
  }
  .wm-main { display: flex; flex-direction: column; align-items: flex-start; line-height: 1; }
  .wm-en {
    font-family: var(--label); letter-spacing: 1.5px; font-size: 11px; line-height: 1;
    margin-bottom: 3px; text-transform: uppercase; white-space: nowrap; text-align: left;
    color: #ef4a30;
    text-shadow: 0 1px 0 oklch(0 0 0 / 0.55);
  }
  .wm-zh {
    font-family: var(--sans); font-weight: 900; font-size: 33px; line-height: 0.92;
    letter-spacing: 1px; transform: skewX(-5deg); white-space: nowrap;
    background: linear-gradient(177deg, #ff7456 0%, #ec3f22 38%, #8e160c 58%, #c5281a 80%, #ef4326 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 0.7px #4d0a05;
    filter: drop-shadow(0 2px 0.6px oklch(0 0 0 / 0.65));
  }
  .live-pill {
    display: inline-flex; align-items: center; gap: 7px; font-family: var(--label);
    letter-spacing: 2px; font-size: 14px; color: var(--band-ink);
    border: 1.5px solid color-mix(in oklab, var(--band-ink) 35%, transparent);
    padding: 4px 11px 3px; border-radius: 3px; white-space: nowrap; flex: 0 0 auto;
  }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 0 var(--accent); animation: ping 1.6s ease-out infinite; }
  @keyframes ping { 0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 70%, transparent); } 70%,100% { box-shadow: 0 0 0 7px transparent; } }

  .scorebar-right { display: flex; align-items: center; gap: 12px; }

  .nominate-btn {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    font-family: var(--sans); font-weight: 800; font-size: 13px; line-height: 1;
    color: #fff; background: var(--accent); border: none;
    padding: 9px 14px; border-radius: 4px; white-space: nowrap;
    box-shadow: 0 2px 0 oklch(0 0 0 / 0.35); transition: transform .12s, filter .12s;
  }
  .nominate-btn .plus { font-size: 15px; line-height: 0; font-weight: 700; }
  .nominate-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .nominate-btn:active { transform: translateY(1px); box-shadow: 0 0 0 oklch(0 0 0 / 0.35); }
  .nominate-btn.lg { font-size: 15px; padding: 13px 22px; box-shadow: 0 3px 0 oklch(0 0 0 / 0.3); }

  /* roster CTA band */
  .roster-cta {
    margin-top: 18px; border: 2px dashed var(--line-strong); background: var(--panel-2);
    padding: 22px 26px; display: flex; align-items: center; justify-content: space-between;
    gap: 22px; flex-wrap: wrap;
  }
  .rc-kicker { font-family: var(--label); letter-spacing: 2px; font-size: 13px; color: var(--accent); }
  .rc-text p { margin: 5px 0 0; font-weight: 700; font-size: 16px; }

  /* footer */
  .site-foot { border-top: 2px solid var(--line-strong); background: var(--panel); }
  .foot-in {
    max-width: var(--maxw); margin: 0 auto; padding: 20px 26px;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  .byline { display: inline-flex; align-items: center; gap: 7px; text-decoration: none; white-space: nowrap; }
  .byline-k { font-family: var(--label); letter-spacing: 1.5px; font-size: 12px; color: var(--ink-3); }
  .byline-v {
    font-family: var(--mono); font-weight: 600; font-size: 14px; color: var(--ink);
    padding-bottom: 1px; border-bottom: 1.5px solid var(--accent); transition: color .14s;
  }
  .byline:hover .byline-v { color: var(--accent); }
  .foot-note { font-size: 12px; color: var(--ink-3); margin-left: auto; }

  /* nomination modal */
  .modal-scrim {
    position: fixed; inset: 0; z-index: 100; background: oklch(0.12 0.01 262 / 0.55);
    backdrop-filter: blur(3px); display: grid; place-items: center; padding: 24px;
    animation: fade .14s ease both;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    position: relative; width: min(480px, 100%); max-height: 90vh; overflow: auto;
    background: var(--panel); border: 2px solid var(--line-strong);
    box-shadow: 0 20px 60px oklch(0 0 0 / 0.35); padding: 30px 30px 26px;
  }
  .modal-x {
    position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; cursor: pointer;
    border: none; background: transparent; color: var(--ink-3); font-size: 15px; border-radius: 4px;
  }
  .modal-x:hover { background: var(--panel-2); color: var(--ink); }
  .modal-kicker { font-family: var(--label); letter-spacing: 2px; font-size: 13px; color: var(--accent); }
  .modal-head h3 { font-family: var(--display); font-size: 27px; margin: 6px 0 6px; letter-spacing: 0.5px; }
  .modal-head p { margin: 0 0 18px; font-size: 13.5px; color: var(--ink-2); line-height: 1.6; }

  .fld { display: block; margin-bottom: 14px; }
  .fld-k { display: block; font-weight: 700; font-size: 13px; margin-bottom: 6px; }
  .fld-k i { color: var(--accent); font-style: normal; }
  .fld-k i.opt { color: var(--ink-3); font-weight: 400; font-size: 12px; }
  .fld input, .fld textarea {
    width: 100%; font-family: var(--sans); font-size: 14px; color: var(--ink);
    background: var(--field); border: 1.5px solid var(--line); border-radius: 4px;
    padding: 10px 12px; resize: vertical; transition: border-color .12s;
  }
  .fld input::placeholder, .fld textarea::placeholder { color: var(--ink-3); }
  .fld input:focus, .fld textarea:focus { outline: none; border-color: var(--accent); }

  .seg { display: flex; border: 1.5px solid var(--line); border-radius: 4px; overflow: hidden; width: fit-content; }
  .seg-btn {
    font-family: var(--sans); font-weight: 700; font-size: 13px; cursor: pointer;
    background: var(--field); color: var(--ink-2); border: none; border-right: 1.5px solid var(--line);
    padding: 8px 14px; transition: background .12s, color .12s;
  }
  .seg-btn:last-child { border-right: none; }
  .seg-btn.on { background: var(--ink); color: var(--field); }

  .modal-foot { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
  .btn-ghost {
    font-family: var(--sans); font-weight: 700; font-size: 14px; cursor: pointer;
    background: transparent; color: var(--ink-2); border: 1.5px solid var(--line); border-radius: 4px; padding: 11px 18px;
  }
  .btn-ghost:hover { border-color: var(--ink-3); color: var(--ink); }
  .btn-primary {
    font-family: var(--sans); font-weight: 800; font-size: 14px; cursor: pointer;
    background: var(--accent); color: #fff; border: none; border-radius: 4px; padding: 11px 22px;
    box-shadow: 0 2px 0 oklch(0 0 0 / 0.3); transition: filter .12s, transform .12s;
  }
  .btn-primary:hover { filter: brightness(1.06); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

  .modal-done { text-align: center; padding: 12px 4px 4px; }
  .md-stamp { font-family: var(--label); letter-spacing: 2.5px; font-size: 14px; color: #fff; background: var(--win); padding: 5px 12px 4px; border-radius: 4px; display: inline-block; transform: rotate(-3deg); }
  .modal-done h3 { font-family: var(--display); font-size: 26px; margin: 16px 0 8px; }
  .modal-done p { font-size: 14px; color: var(--ink-2); line-height: 1.65; margin: 0 0 22px; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 30px 26px 110px; }

  /* ---------- section header ---------- */
  .sec-head { display: flex; align-items: baseline; gap: 14px; margin: 0 0 14px; flex-wrap: nowrap; }
  .sec-head h2 {
    font-family: var(--display); font-size: 30px; letter-spacing: 0.5px; margin: 0; line-height: 1;
    text-transform: none;
  }
  .sec-head .en { font-family: var(--label); font-size: 17px; letter-spacing: 2.5px; color: var(--ink-3); white-space: nowrap; }
  .sec-head h2 { white-space: nowrap; }
  .sec-head .note { margin-left: auto; font-size: 12.5px; color: var(--ink-3); }

  /* ---------- standings ---------- */
  .standings { background: var(--panel); border: 2px solid var(--line-strong); margin-bottom: 46px; }
  .st-row {
    display: grid;
    grid-template-columns: 60px minmax(0,1fr) 116px 84px 168px 130px;
    align-items: center; gap: 14px; padding: 0 18px;
  }
  .st-head {
    background: var(--band); color: var(--band-ink); min-height: 38px;
    font-family: var(--label); letter-spacing: 1.6px; font-size: 13px;
  }
  .st-head > div { padding: 9px 0 7px; }
  .st-body .st-row { min-height: 78px; border-top: 1px solid var(--line); cursor: pointer; transition: background .12s; }
  .st-body .st-row:first-child { border-top: none; }
  .st-body .st-row:hover { background: var(--panel-2); }
  .st-row.is-active { background: color-mix(in oklab, var(--accent) 9%, var(--panel)); box-shadow: inset 4px 0 0 var(--accent); }
  .st-row.rank-1 { background: color-mix(in oklab, var(--gold) 11%, var(--panel)); }
  .st-row.dnp { opacity: 0.62; }

  .rank { font-family: var(--display); font-size: 34px; line-height: 1; color: var(--ink); letter-spacing: -1px; }
  .rank-1 .rank { color: var(--gold); }
  .rank-tag { font-family: var(--label); letter-spacing: 1px; font-size: 12px; color: var(--ink-3); }

  .player { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .jersey {
    width: 42px; height: 42px; border-radius: 4px; flex: 0 0 auto; display: grid; place-items: center;
    color: #fff; font-family: var(--display); font-size: 19px; line-height: 1;
    background: oklch(0.6 0.16 var(--hue));
  }
  .player-meta { min-width: 0; }
  .player-name { font-weight: 900; font-size: 17px; line-height: 1.15; }
  .player-blurb { font-size: 11.5px; color: var(--ink-3); line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .record { font-family: var(--mono); font-weight: 600; font-size: 16px; }
  .record .w { color: var(--win); } .record .l { color: var(--loss); } .record .sep { color: var(--ink-3); margin: 0 2px; }
  .record .sub { display: block; font-family: var(--label); letter-spacing: 1px; font-size: 10.5px; color: var(--ink-3); margin-top: 1px; }
  .winpct { font-family: var(--mono); font-weight: 600; font-size: 16px; }

  .score { text-align: left; }
  .score .big { font-family: var(--display); font-size: 33px; line-height: 0.95; letter-spacing: -0.5px; }
  .score .cap { font-family: var(--label); letter-spacing: 1.4px; font-size: 10.5px; color: var(--ink-3); display: block; }

  .form { display: flex; gap: 5px; align-items: center; }
  .form-dot {
    width: 22px; height: 22px; border-radius: 4px; display: grid; place-items: center;
    font-family: var(--label); font-size: 13px; letter-spacing: 0.5px; color: #fff; line-height: 1;
  }
  .form-dot.w { background: var(--win); } .form-dot.l { background: var(--loss); }
  .form-dot.n { background: transparent; color: var(--ink-3); border: 1.5px dashed var(--line); }
  .form-empty { font-size: 12px; color: var(--ink-3); font-style: italic; }

  /* ---------- filters ---------- */
  .filters { display: flex; flex-wrap: wrap; gap: 0; margin-bottom: 22px; border: 2px solid var(--line-strong); width: fit-content; max-width: 100%; }
  .tab {
    font-family: var(--sans); font-weight: 700; font-size: 13.5px; cursor: pointer;
    background: var(--panel); color: var(--ink-2); border: none; border-right: 2px solid var(--line-strong);
    padding: 9px 15px; display: inline-flex; align-items: center; gap: 7px; line-height: 1; transition: background .12s, color .12s;
  }
  .tab:last-child { border-right: none; }
  .tab:hover { background: var(--panel-2); color: var(--ink); }
  .tab.on { background: var(--ink); color: var(--field); }
  .tab .cnt { font-family: var(--mono); font-size: 11px; opacity: 0.7; }
  .tab .jd { width: 16px; height: 16px; border-radius: 3px; display: grid; place-items: center; color: #fff; font-family: var(--display); font-size: 10px; background: oklch(0.6 0.16 var(--hue)); }
  .tab.toggle.on { background: var(--accent); color: #fff; }

  /* ---------- play-by-play ---------- */
  .pbp { border: 2px solid var(--line-strong); background: var(--panel); }
  .play { display: grid; grid-template-columns: 168px minmax(0,1fr) 250px; border-top: 2px solid var(--line-strong); position: relative; }
  .play:first-child { border-top: none; }
  .play::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--bar, var(--line)); }
  .play.win { --bar: var(--win); } .play.loss { --bar: var(--loss); } .play.wait { --bar: var(--gold); } .play.none { --bar: var(--line); }

  .fixture { padding: 18px 16px 18px 20px; border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 9px; }
  .fx-top { display: flex; align-items: center; gap: 10px; }
  .fx-name { font-weight: 900; font-size: 15px; line-height: 1.1; }
  .fx-time { font-family: var(--label); letter-spacing: 1px; font-size: 12px; color: var(--ink-3); white-space: nowrap; }
  .fx-name { white-space: nowrap; }
  .fx-badge { font-family: var(--label); letter-spacing: 1.2px; font-size: 12px; padding: 3px 8px 2px; border-radius: 3px; color: #fff; width: fit-content; }
  .fx-badge.long { background: var(--win); } .fx-badge.sell { background: var(--loss); } .fx-badge.none { background: transparent; color: var(--ink-3); border: 1.5px dashed var(--line); }

  .play-body { padding: 18px 22px; min-width: 0; display: flex; flex-direction: column; gap: 11px; }
  .play-title { font-family: var(--display); font-size: 19px; line-height: 1.15; margin: 0; letter-spacing: 0.3px; }
  .kind { font-family: var(--label); letter-spacing: 1.5px; font-size: 12px; color: var(--ink-3); border: 1.5px solid var(--line); padding: 2px 7px 1px; border-radius: 3px; }
  .play-text { white-space: pre-wrap; font-size: 14.5px; line-height: 1.7; margin: 0; word-break: break-word; }
  .play-text.clamp { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .more { align-self: flex-start; background: none; border: none; padding: 0; font: inherit; font-size: 13px; font-weight: 700; color: var(--accent); cursor: pointer; }
  .play-foot { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; }
  .src { margin-left: auto; font-family: var(--label); letter-spacing: 1px; font-size: 13px; color: var(--ink-3); text-decoration: none; white-space: nowrap; }
  .src:hover { color: var(--accent); }
  .tag { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; font-size: 12.5px; padding: 4px 9px; border-radius: 3px; }
  .tag.long { color: var(--win); background: var(--win-bg); } .tag.sell { color: var(--loss); background: var(--loss-bg); }
  .tag .tk { font-family: var(--mono); font-weight: 600; }
  .tag .mk { font-family: var(--mono); font-size: 9.5px; opacity: 0.65; align-self: flex-start; }

  /* ---------- result column ---------- */
  .result { border-left: 1px solid var(--line); background: var(--panel-2); padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
  .res-item { display: flex; flex-direction: column; gap: 6px; }
  .res-item + .res-item { border-top: 1px solid var(--line); padding-top: 13px; }
  .res-tk { display: flex; align-items: baseline; gap: 7px; }
  .res-tk .sym { font-family: var(--mono); font-weight: 700; font-size: 15px; letter-spacing: 0.5px; }
  .res-tk .mk { font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--ink-3); border: 1px solid var(--line); border-radius: 3px; padding: 0 3px; }
  .res-tk .co { font-size: 11px; color: var(--ink-3); margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .verdict-line { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
  .verdict { font-weight: 900; font-size: 15px; line-height: 1; white-space: nowrap; flex: 0 0 auto; }
  .verdict.win { color: var(--win); } .verdict.lose { color: var(--loss); } .verdict.wait { color: var(--ink-3); }
  .stamp { font-family: var(--label); letter-spacing: 0.5px; font-size: 12px; color: #fff; padding: 3px 8px 2px; border-radius: 3px; white-space: nowrap; flex: 0 0 auto; }
  .stamp.win { background: var(--win); } .stamp.lose { background: var(--loss); } .stamp.wait { background: var(--ink-3); }
  .pnl-big { font-family: var(--display); font-size: 38px; line-height: 0.9; letter-spacing: -1px; }
  .res-cols { display: flex; gap: 16px; }
  .res-col { display: flex; flex-direction: column; }
  .res-col .k { font-family: var(--label); letter-spacing: 1px; font-size: 10px; color: var(--ink-3); }
  .res-col .v { font-family: var(--mono); font-weight: 600; font-size: 13px; }
  .res-col .v.wait { color: var(--ink-3); font-weight: 400; font-size: 11px; }
  .res-none { display: flex; flex-direction: column; gap: 4px; justify-content: center; height: 100%; }
  .res-none .big { font-family: var(--display); font-size: 21px; color: var(--ink-3); letter-spacing: 0.5px; }
  .res-none .sub { font-size: 11.5px; color: var(--ink-3); }
  .spark { display: block; }

  /* ---------- responsive ---------- */
  @media (max-width: 900px) {
    .st-row { grid-template-columns: 44px minmax(0,1fr) 150px 120px; gap: 10px; }
    .st-head .col-win, .st-head .col-form, .st-cell-win, .st-cell-form { display: none; }
    .play { grid-template-columns: 1fr; }
    .result { border-left: none; border-top: 1px solid var(--line); flex-direction: row; flex-wrap: wrap; gap: 22px; }
