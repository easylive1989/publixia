name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'stock-dashboard.service'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: python -m pytest tests/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} "mkdir -p /opt/stock-dashboard/backend"
          rsync -av --delete \
            --exclude='.venv' --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='stock_dashboard.db' --exclude='.env' \
            backend/ root@${{ secrets.VPS_HOST }}:/opt/stock-dashboard/backend/
          rsync -av stock-dashboard.service \
            root@${{ secrets.VPS_HOST }}:/opt/stock-dashboard/stock-dashboard.service

      - name: Write env file
        run: |
          ssh root@${{ secrets.VPS_HOST }} "cat > /opt/stock-dashboard/backend/.env <<'EOF'
          DISCORD_STOCK_WEBHOOK_URL=${{ secrets.DISCORD_STOCK_WEBHOOK_URL }}
          FINMIND_TOKEN=${{ secrets.FINMIND_TOKEN }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL=${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET=${{ secrets.R2_BUCKET }}
          FOREIGN_FLOW_WORKER_TOKEN=${{ secrets.FOREIGN_FLOW_WORKER_TOKEN }}
          FOREIGN_FLOW_WORKER_URL=${{ secrets.FOREIGN_FLOW_WORKER_URL }}
          EOF
          chmod 600 /opt/stock-dashboard/backend/.env"

      - name: Install deps and restart service
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            set -e
            cd /opt/stock-dashboard/backend
            python3 -m venv .venv
            .venv/bin/pip install -q -r requirements.txt
            cp /opt/stock-dashboard/stock-dashboard.service /etc/systemd/system/stock-dashboard.service
            systemctl daemon-reload
            systemctl enable stock-dashboard
            systemctl restart stock-dashboard
            systemctl status stock-dashboard --no-pager
          "
