name: Deploy Admin CLI

on:
  push:
    branches:
      - master
    paths:
      - 'admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (admin tests import backend modules)
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: python -m pytest tests/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync admin/ to VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} "mkdir -p /opt/stock-dashboard/admin"
          rsync -av --delete \
            --exclude='.venv' --exclude='__pycache__' --exclude='*.pyc' \
            admin/ root@${{ secrets.VPS_HOST }}:/opt/stock-dashboard/admin/

      - name: Install admin CLI deps on VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            set -e
            cd /opt/stock-dashboard/admin
            python3 -m venv .venv
            .venv/bin/pip install -q -r requirements.txt
          "
